<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="reg-page" class="page active">
        <div class="header-box">
            <h2>Nur Marketga xush kelibsiz!</h2>
            <p>Buyurtma berish uchun ma'lumotlaringizni kiriting:</p>
        </div>
        <input type="text" id="user-name" placeholder="Ism va Familiya">
        <input type="tel" id="user-phone" placeholder="+998 90 123 45 67">
        <button onclick="saveUser()">Kirish</button>
    </div>

    <div id="shop-page" class="page">
        <div id="product-list">
            </div>
        <div id="cart-btn" class="floating-cart" onclick="checkout()">
            🛒 Savatni ko'rish (0)
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
