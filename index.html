<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="reg-page" class="page active">
        <h2>Nur Marketga xush kelibsiz!</h2>
        <input type="text" id="user-name" placeholder="Ismingiz">
        <input type="tel" id="user-phone" placeholder="Telefon raqamingiz">
        <button onclick="saveUser()">Do'konga kirish</button>
    </div>

    <div id="shop-page" class="page">
        <div id="product-list"></div> 
        
        <button id="cart-btn" class="cart-btn" onclick="checkout()">🛒 Zakazni yuborish</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
