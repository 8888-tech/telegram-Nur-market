<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="reg-page" class="page active">
        <h2>Xush kelibsiz!</h2>
        <input type="text" id="user-name" placeholder="Ismingizni yozing">
        <button onclick="registerUser()">Kirish</button>
    </div>

    <div id="shop-page" class="page">
        <div class="cat-bar">
            <button onclick="filter('Barchasi')">Barchasi</button>
            <button onclick="filter('Xo\'jalik')">Xo'jalik</button>
        </div>
        <div id="product-list" class="grid"></div>
        <button class="cart-btn" onclick="checkout()">🛒 Zakaz berish</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
