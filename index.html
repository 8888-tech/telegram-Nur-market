<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f9f9f9; padding-bottom: 80px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        .add-btn { background: #ff9800; border: none; width: 35px; height: 35px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; }
        .back-btn { background: #eee; padding: 10px; margin: 10px; border: none; width: 90%; border-radius: 8px; }
        .cat-card { background: white; padding: 20px; margin: 10px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
    </style>
</head>
<body>
    <div id="product-list"></div>
    <script src="app.js?v=101"></script>
</body>
</html>
